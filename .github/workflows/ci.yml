name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs of the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.26"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Pin Python via uv
        run: uv python install 3.12

      - name: Sync dependencies (frozen)
        run: uv sync --frozen --all-extras

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src

      - name: pytest
        run: uv run pytest --cov=src/health --cov-report=term-missing
